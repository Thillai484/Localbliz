<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Customers</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard-layout">

  <!-- Sidebar -->
  <aside class="sidebar glass-panel">
  <div class="sidebar-logo">LocalBiz Pulse</div>

  <ul class="nav-menu">

    <li class="nav-item">
      <a href="dashboard.html" class="nav-link">
        <span class="nav-icon">🏠</span>
        Dashboard
      </a>
    </li>

    <li class="nav-item">
      <a href="sales.html" class="nav-link">
        <span class="nav-icon">📊</span>
        Sales
      </a>
    </li>

    <li class="nav-item">
      <a href="expenses.html" class="nav-link">
        <span class="nav-icon">💸</span>
        Expenses
      </a>
    </li>

    <li class="nav-item">
      <a href="customers.html" class="nav-link">
        <span class="nav-icon">👥</span>
        Customers
      </a>
    </li>

  </ul>
   <div class="logout-container">
    <button onclick="logout()" class="logout-btn">
      <span class="nav-icon">🚪</span>
      Logout
    </button>
  </div>
</aside>
  <!-- Main -->
  <main class="main-content">

    <div class="section-card glass-panel">

      <div class="section-header">
        <h3 class="section-title">👥 Customers</h3>
        <button class="btn btn-primary btn-sm" onclick="openModal()">+ Add Customer</button>
      </div>

      <ul id="customerList" class="data-list"></ul>

    </div>

  </main>

</div>

<!-- Modal -->
<div id="modal" class="modal-overlay">
  <div class="modal-content glass-panel">

    <div class="modal-header">
      <h3>Add Customer</h3>
      <button class="close-modal" onclick="closeModal()">×</button>
    </div>

    <div class="form-group">
      <input type="text" id="name" class="form-control" placeholder="Name">
    </div>

    <div class="form-group">
      <input type="text" id="phone" class="form-control" placeholder="Phone">
    </div>

    <div class="form-group">
      <input type="text" id="purchase" class="form-control" placeholder="Purchase">
    </div>

    <button class="btn btn-primary btn-block" onclick="addCustomer()">Save</button>

  </div>
</div>

<script src="js/app.js"></script>

<script>
function openModal(){ modal.classList.add("active"); }
function closeModal(){ modal.classList.remove("active"); }

async function loadCustomers(){
  const data = await apiCall('/customers');
  const list = document.getElementById('customerList');
  list.innerHTML = '';

  data.forEach(c=>{
    list.innerHTML += `
      <li class="data-item">
        <div class="data-info">
          <h4>${c.name}</h4>
          <p>${c.phone || ''}</p>
        </div>
        <div>${c.purchase || ''}</div>
      </li>`;
  });
}

async function addCustomer(){
  try {
    const nameVal = document.getElementById('name').value;
    const phoneVal = document.getElementById('phone').value;
    const purchaseVal = document.getElementById('purchase').value;

    console.log(nameVal, phoneVal, purchaseVal); // 🔥 debug

    await apiCall('/customers','POST',{
      name: nameVal,
      phone: phoneVal,
      purchase: purchaseVal
    });

    alert("Customer Added ✅");

    closeModal();
    loadCustomers();

  } catch(err){
    console.error(err);
    alert("Error: " + err.message);
  }
}

async function deleteCustomer(id){
  await apiCall(`/customers/${id}`,'DELETE');
  loadCustomers();
}

window.onload = loadCustomers;
</script>

</body>
</html>
