<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sales</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard-layout">

  <!-- Sidebar -->
  <aside class="sidebar glass-panel">
  <div class="sidebar-logo">LocalBiz Pulse</div>

  <ul class="nav-menu">

    <li class="nav-item">
      <a href="dashboard.html" class="nav-link">
        <span class="nav-icon">🏠</span>
        Dashboard
      </a>
    </li>

    <li class="nav-item">
      <a href="sales.html" class="nav-link">
        <span class="nav-icon">📊</span>
        Sales
      </a>
    </li>

    <li class="nav-item">
      <a href="expenses.html" class="nav-link">
        <span class="nav-icon">💸</span>
        Expenses
      </a>
    </li>

    <li class="nav-item">
      <a href="customers.html" class="nav-link">
        <span class="nav-icon">👥</span>
        Customers
      </a>
    </li>

  </ul>
   <div class="logout-container">
    <button onclick="logout()" class="logout-btn">
      <span class="nav-icon">🚪</span>
      Logout
    </button>
  </div>
</aside>

  <!-- Main -->
  <main class="main-content">

    <div class="section-card glass-panel">
      
      <div class="section-header">
        <h3 class="section-title">📊 Sales</h3>
        <button class="btn btn-primary btn-sm" onclick="openModal()">+ Add Sale</button>
      </div>

      <ul id="salesList" class="data-list"></ul>

    </div>

  </main>

</div>

<!-- Modal -->
<div id="modal" class="modal-overlay">
  <div class="modal-content glass-panel">

    <div class="modal-header">
      <h3>Add Sale</h3>
      <button class="close-modal" onclick="closeModal()">×</button>
    </div>

    <div class="form-group">
      <input type="number" id="amount" class="form-control" placeholder="Amount">
    </div>

    <div class="form-group">
      <input type="date" id="date" class="form-control">
    </div>

    <div class="form-group">
      <input type="text" id="notes" class="form-control" placeholder="Notes">
    </div>

    <button class="btn btn-primary btn-block" onclick="addSale()">Save</button>

  </div>
</div>

<script src="js/app.js"></script>

<script>
function openModal(){ modal.classList.add("active"); }
function closeModal(){ modal.classList.remove("active"); }

async function loadSales(){
  const data = await apiCall('/sales');
  const list = document.getElementById('salesList');
  list.innerHTML = '';

  data.forEach(s=>{
    list.innerHTML += `
      <li class="data-item">
        <div class="data-info">
          <h4>${s.notes || 'Sale'}</h4>
          <p>${s.date}</p>
        </div>
        <div class="data-amount amount-positive">
          +₹${s.amount}
        </div>
      </li>`;
  });
}

async function addSale(){
  await apiCall('/sales','POST',{
    amount: amount.value,
    date: date.value,
    notes: notes.value
  });
  closeModal();
  loadSales();
}

async function deleteSale(id){
  await apiCall(`/sales/${id}`,'DELETE');
  loadSales();
}

window.onload = loadSales;
</script>

</body>
</html>
