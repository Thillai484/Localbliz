<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - LocalBiz Pulse</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-container glass-panel">
      <div class="auth-header">
        <div class="auth-logo">LocalBiz Pulse</div>
        <p>Manage your business effortlessly</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" class="form-control" autocomplete="email" required placeholder="Enter your email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" class="form-control" autocomplete="current-password" required placeholder="Enter your password">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>

      <div class="auth-link">
        Don't have an account? <a href="register.html">Register here</a>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  
  <script>
requireNoAuth();

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const btn = e.target.querySelector('button');

  btn.textContent = 'Signing in...';
  btn.disabled = true;

  try {
    const data = await apiCall('/auth/login', 'POST', { email, password });

    setToken(data.token);

    // 🔥 ADD THIS LINE (VERY IMPORTANT FIX)
    localStorage.setItem('user_name', data.user.name);

    showToast('Login successful', 'success');

    setTimeout(() => {
      window.location.href = 'dashboard.html';
    }, 1000);

  } catch (err) {
    showToast(err.message, 'error');
    btn.textContent = 'Sign In';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
