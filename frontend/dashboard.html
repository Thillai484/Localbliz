<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - LocalBiz Pulse</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div class="dashboard-layout">
    
    <!-- Sidebar -->
    <aside class="sidebar glass-panel">
  <div class="sidebar-logo">LocalBiz Pulse</div>

  <ul class="nav-menu">

    <li class="nav-item">
      <a href="dashboard.html" class="nav-link">
        <span class="nav-icon">🏠</span>
        Dashboard
      </a>
    </li>

    <li class="nav-item">
      <a href="sales.html" class="nav-link">
        <span class="nav-icon">📊</span>
        Sales
      </a>
    </li>

    <li class="nav-item">
      <a href="expenses.html" class="nav-link">
        <span class="nav-icon">💸</span>
        Expenses
      </a>
    </li>

    <li class="nav-item">
      <a href="customers.html" class="nav-link">
        <span class="nav-icon">👥</span>
        Customers
      </a>
    </li>

    </ul>
    <div class="logout-container">
    <button onclick="logout()" class="logout-btn">
      <span class="nav-icon">🚪</span>
      Logout
    </button>
  </div>

</aside>
    <!-- Main Content -->
    <main class="main-content">
      
      <div class="topbar">
        <div>
          <h2>Welcome back, <span id="user-name-display">...</span>! 👋</h2>
          <p>Here's what's happening with your business today.</p>
        </div>
        <div class="user-profile">
          <div class="user-avatar" id="user-avatar">?</div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-card glass-card">
          <div class="stat-header">
            <span class="stat-title">Total Sales</span>
            <div class="stat-icon icon-blue"><i class="fas fa-wallet"></i></div>
          </div>
          <div class="stat-value">₹<span id="stat-sales">0.00</span></div>
        </div>

        <div class="stat-card glass-card">
          <div class="stat-header">
            <span class="stat-title">Total Expenses</span>
            <div class="stat-icon icon-red"><i class="fas fa-file-invoice-dollar"></i></div>
          </div>
          <div class="stat-value">₹<span id="stat-expenses">0.00</span></div>
        </div>

        <div class="stat-card glass-card">
          <div class="stat-header">
            <span class="stat-title">Net Profit</span>
            <div class="stat-icon icon-green"><i class="fas fa-chart-pie"></i></div>
          </div>
          <div class="stat-value">₹<span id="stat-profit">0.00</span></div>
        </div>

        <div class="stat-card glass-card">
          <div class="stat-header">
            <span class="stat-title">Health Score</span>
            <div class="stat-icon icon-purple"><i class="fas fa-heartbeat"></i></div>
          </div>
          <div class="stat-value"><span id="stat-health">0</span>/100</div>
          <div class="health-score-indicator">
            <div class="health-bar" id="health-bar" style="width: 0%; background: #10b981;"></div>
          </div>
        </div>
      </div>

      <!-- Sections -->
      <div class="dashboard-sections">
        
        <!-- Recent Sales Section -->
        <div class="section-card glass-card">
          <div class="section-header">
            <h3 class="section-title"><i class="fas fa-chart-line text-primary"></i> Recent Sales</h3>
          </div>
          <div class="section-content">
            <ul class="data-list" id="sales-list">
              <li>Loading...</li>
            </ul>
          </div>
        </div>

        <!-- Recent Expenses Section -->
        <div class="section-card glass-card">
          <div class="section-header">
            <h3 class="section-title"><i class="fas fa-receipt text-danger"></i> Recent Expenses</h3>
          </div>
          <div class="section-content">
            <ul class="data-list" id="expenses-list">
              <li>Loading...</li>
            </ul>
          </div>
        </div>

      </div>

    </main>
  </div>

  <!-- Add Sale Modal -->


  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
